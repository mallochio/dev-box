services:
  - type: pserv
    name: paseo-devbox
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: paseo-workspace
      mountPath: /workspace
      sizeGB: 20
    envVars:
      - key: PASEO_PASSWORD
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
